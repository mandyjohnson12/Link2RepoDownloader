name: 🧹 Clean Delivery Repositories (M-NRZ)
on:
  workflow_dispatch:

jobs:
  purge_repositories:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Main Manager Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ADMIN_PAT }}

      - name: System Environment Check
        env:
          ADMIN_PAT: ${{ secrets.ADMIN_PAT }}
        run: |
          if [ -z "$ADMIN_PAT" ]; then
            echo "❌ Error: ADMIN_PAT secret is missing. Cleaner cannot authenticate."
            exit 1
          fi

      - name: Identify and Purge Isolated Storage Repositories
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: |
          echo "🔍 Fetching repository ecosystem list for user: $GITHUB_OWNER..."
          
          # Safely extract repo names matching your prefix template
          TARGET_REPOS=$(gh repo list $GITHUB_OWNER --limit 200 --json name --jq '.[] | select(.name | startswith("file-delivery-")) | .name')

          if [ -z "$TARGET_REPOS" ]; then
            echo "✅ No temporary transport repositories found. Your profile is already clean!"
            echo "## ✨ Clean-up Complete" >> $GITHUB_STEP_SUMMARY
            echo "No temporary transport modules starting with \`file-delivery-\` were found on your profile." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "## 🧹 Purged Repositories Log" >> $GITHUB_STEP_SUMMARY
          echo "The following temporary delivery channels were processed:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for REPO in $TARGET_REPOS; do
            echo "----------------------------------------------------"
            echo "💥 Target discovered: $GITHUB_OWNER/$REPO"
            
            # Alternative bulletproof syntax for automated scripting environments:
            # Passes the full unique repository path first, followed by the confirmation bypass flag.
            if gh repo delete "$GITHUB_OWNER/$REPO" --yes; then
              echo "🗑️ Successfully deleted: $REPO"
              echo "*   ❌ \`$REPO\` (Permanently Deleted)" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ Standard deletion skipped. Testing API fallback protocol..."
              
              # Fallback direct raw API invocation bypass mechanism
              if gh api -X DELETE "repos/$GITHUB_OWNER/$REPO" --silent; then
                echo "🗑️ Successfully wiped via API: $REPO"
                echo "*   ❌ \`$REPO\` (Permanently Deleted via API)" >> $GITHUB_STEP_SUMMARY
              else
                echo "❌ Fatal: Could not destroy $REPO."
                echo "💡 Double-check that your 'ADMIN_PAT' token has the explicit 'delete_repo' checkbox enabled!"
                echo "*   ⚠️ \`$REPO\` (Deletion Failed - Check Token Permissions)" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done

      - name: Reset Main Manager README Records
        run: |
          echo "📝 Resetting README.md directory layout tracking pointers..."
          python3 -c "
          marker_start = '<!-- DOWNLOADED-REPOS-START -->'
          marker_end = '<!-- DOWNLOADED-REPOS-END -->'
          with open('README.md', 'r') as f:
              content = f.read()
          if marker_start in content and marker_end in content:
              parts_before = content.split(marker_start)[0]
              parts_after = content.split(marker_end)[1]
              updated_content = parts_before + marker_start + '\n' + marker_end + parts_after
              with open('README.md', 'w') as f:
                  f.write(updated_content)
              print('README cleared successfully.')
          "

      - name: Commit and Push Clean Dashboard Update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff-index --quiet HEAD || git commit -m "chore: flush delivery index directory entries out of system matrix"
          git push origin main
