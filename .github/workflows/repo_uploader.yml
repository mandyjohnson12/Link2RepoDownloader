name: Multi-File Downloader via Repository Injection (M-NRZ)
on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: 'Paste URLs (Separated by spaces OR newlines)'
        required: true
        type: string

jobs:
  create_and_push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Main Manager Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ADMIN_PAT }} # Uses your token so it can push updates back to README

      - name: System Environment Check
        env:
          ADMIN_PAT: ${{ secrets.ADMIN_PAT }}
        run: |
          if [ -z "$ADMIN_PAT" ]; then
            echo "❌ Error: ADMIN_PAT secret is missing. Please create it in your settings."
            exit 1
          fi

      - name: Process, Split, and Deploy All Links
        env:
          RAW_URLS: ${{ github.event.inputs.file_urls }}
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
          ADMIN_PAT: ${{ secrets.ADMIN_PAT }}
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: |
          # SANITIZATION ENGINE: Convert spaces to newlines and clean empty rows
          echo "$RAW_URLS" | tr ' ' '\n' | tr -d '\r' | sed '/^[[:space:]]*$/d' > clean_urls.txt

          echo "## 📦 Multi-Link Extraction Summary" >> $GITHUB_STEP_SUMMARY
          echo "Your files have been isolated into dedicated repositories. Download each repository ZIP below:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          COUNTER=1

          while IFS= read -r URL || [ -n "$URL" ]; do
            echo "----------------------------------------------------"
            echo "Processing Link ($COUNTER): $URL"
            
            WORK_DIR="job_space_${COUNTER}"
            mkdir -p "$WORK_DIR"
            cd "$WORK_DIR"
            
            RAW_NAME=$(basename "$URL" | cut -d? -f1)
            FILENAME=$(echo "$RAW_NAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
            
            if [ -z "$FILENAME" ]; then
              FILENAME="downloaded_file_${COUNTER}.bin"
            fi

            echo "📥 Downloading $FILENAME..."
            if ! curl -L "$URL" -o "$FILENAME"; then
              echo "❌ Failed to download $URL. Skipping to next link."
              cd .. && rm -rf "$WORK_DIR"
              COUNTER=$((COUNTER + 1))
              continue
            fi

            FILE_SIZE=$(du -m "$FILENAME" | cut -f1)
            IS_SPLIT="false"
            
            # Local git initialization for the sub-repo (Needed early to write internal configurations)
            git init
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"

            echo "# Storage Container for $FILENAME" > README.md
            echo "This isolated branch securely stores your asset package." >> README.md
            echo "" >> README.md

            if [ "$FILE_SIZE" -gt 95 ]; then
              echo "⚠️ File size is $FILE_SIZE MB (Exceeds 95MB limit). Activating Split Engine..."
              split -b 90m "$FILENAME" "${FILENAME}.part_"
              rm "$FILENAME"
              IS_SPLIT="true"

              # CREATE AUTOMATED WINDOWS BATCH FILE
              echo "@echo off" > Run_Merger.bat
              echo "echo 🛠️ M-NRZ Automated File Unification Module" >> Run_Merger.bat
              echo "echo 📥 Stitching broken data fragments back into: $FILENAME" >> Run_Merger.bat
              echo "copy /b \"$FILENAME.part_*\" \"$FILENAME\"" >> Run_Merger.bat
              echo "echo ✅ Reassembly complete! Clean archive has been successfully restored." >> Run_Merger.bat
              echo "pause" >> Run_Merger.bat

              echo "### 🛠️ Reassembly Instructions" >> README.md
              echo "This file was split to fit within GitHub limits. To stitch it back together:" >> README.md
              echo "- **Windows:** Simply double-click the **\`Run_Merger.bat\`** file inside this folder!" >> README.md
              echo "- **Linux / Mac / Android:** Run \`cat \"$FILENAME.part_\"* > \"$FILENAME\"\` inside your terminal." >> README.md
            else
              echo "✅ File size is $FILE_SIZE MB. Keeping original unified format."
            fi

            SAFE_NAME=$(echo "$FILENAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_-]/_/g' | cut -c1-50)
            REPO_NAME="file-delivery-${SAFE_NAME}-${COUNTER}"
            
            echo "🛠️ Creating dedicated repository: $REPO_NAME"
            gh repo create "$REPO_NAME" --public --description "Dedicated transport module for $FILENAME." || true

            git add .
            git commit -m "Deploy asset tracking module via multi-link downloader"
            git remote add origin "https://$ADMIN_PAT@github.com/$GITHUB_OWNER/$REPO_NAME.git"
            git branch -M main
            git push -u origin main --force

            # Step Summary Links
            echo "### 🔹 File: $FILENAME ($FILE_SIZE MB)" >> $GITHUB_STEP_SUMMARY
            echo "🔗 **[Click Here to Download Source ZIP](https://github.com/$GITHUB_OWNER/$REPO_NAME/archive/refs/heads/main.zip)**" >> $GITHUB_STEP_SUMMARY
            
            if [ "$IS_SPLIT" = "true" ]; then
              echo "* ⚡ *This file is split. After unzipping, simply double-click **Run_Merger.bat** to perfectly fuse it back!*" >> $GITHUB_STEP_SUMMARY
            else
              echo "* ✅ *This file is whole. Just unzip it and go.*" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY

            # APPEND REPO LOGIC TO PARENT MANAGER README.MD
            cd ..
            python3 -c "import os; marker='<!-- DOWNLOADED-REPOS-START -->'; entry='*   **File:** $FILENAME ($FILE_SIZE MB) | [Go to Repo](https://github.com/$GITHUB_OWNER/$REPO_NAME) | [🚀 Direct ZIP Download](https://github.com/$GITHUB_OWNER/$REPO_NAME/archive/refs/heads/main.zip)\n'; content=open('README.md').read(); open('README.md','w').write(content.replace(marker, marker+'\n'+entry)) if marker in content else print('Marker error')"

            rm -rf "$WORK_DIR"
            COUNTER=$((COUNTER + 1))

          done < clean_urls.txt
          rm -f clean_urls.txt

      - name: Save and Commit README updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff-index --quiet HEAD || git commit -m "docs: dynamically document newly added repos inside layout structure"
          git push origin main
